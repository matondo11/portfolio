<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial,
        sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .offline-container {
      text-align: center;
      max-width: 600px;
      animation: fadeIn 0.6s ease-in;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .offline-icon {
      font-size: 80px;
      margin-bottom: 20px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.7;
      }
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #fff 0%, #9ca3af 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      font-size: 18px;
      color: #9ca3af;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .retry-btn {
      display: inline-block;
      padding: 12px 32px;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }

    .retry-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
    }

    .retry-btn:active {
      transform: translateY(0);
    }

    .offline-tips {
      margin-top: 50px;
      padding: 20px;
      background: rgba(31, 41, 55, 0.5);
      border-radius: 8px;
      text-align: left;
    }

    .offline-tips h3 {
      font-size: 14px;
      color: #d1d5db;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .offline-tips ul {
      list-style: none;
      padding: 0;
    }

    .offline-tips li {
      font-size: 14px;
      color: #9ca3af;
      padding: 8px 0;
      border-bottom: 1px solid rgba(75, 85, 99, 0.3);
    }

    .offline-tips li:last-child {
      border-bottom: none;
    }

    .offline-tips li:before {
      content: "→ ";
      color: #3b82f6;
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">📡</div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Don't worry, you can still browse cached content.</p>

    <button class="retry-btn" onclick="window.location.reload()">Try Again</button>

    <div class="offline-tips">
      <h3>What you can do:</h3>
      <ul>
        <li>Check your internet connection</li>
        <li>Try refreshing the page</li>
        <li>View cached projects and testimonials</li>
        <li>Come back when you're online for full features</li>
      </ul>
    </div>
  </div>

  <script>
    window.addEventListener("online", function () {
      window.location.reload();
    });
  </script>
</body>
</html>
